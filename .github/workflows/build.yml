name: Build OnePlus N200 Kernel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison build-essential flex \
            libssl-dev libncurses5-dev \
            wget unzip zip \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu

      - name: Download Clang
        run: |
          wget https://github.com/lollol911/dre-kernel-android15/releases/download/clang/linux-x86-722c840a8e4d58b5ebdab62ce78eacdafd301208-clang-r450784e.tar.gz -O clang-toolchain.tar.gz
          mkdir -p $HOME/clang-toolchain
          tar -xzf clang-toolchain.tar.gz -C $HOME/clang-toolchain
          echo "$HOME/clang-toolchain/bin" >> $GITHUB_PATH

      - name: Build Kernel
        run: |
          cd dre-kernel-source
          export ARCH=arm64
          export O=out
          export PATH=$HOME/clang-toolchain/bin:$PATH
          export CC=clang
          export LD=ld.lld
          export CROSS_COMPILE=aarch64-linux-gnu-
          make O=$O ARCH=$ARCH dre_defconfig
          scripts/config --file $O/.config -e CONFIG_SECTION_MISMATCH_WARN_ONLY
          make O=$O ARCH=$ARCH olddefconfig
          make -j$(nproc) O=$O ARCH=$ARCH CC=$CC LD=$LD CROSS_COMPILE=$CROSS_COMPILE

      - name: Package AnyKernel3
        run: |
          mkdir -p kernel-zip

          # Debug: show boot directory contents
          echo "=== Boot directory contents ==="
          ls -al dre-kernel-source/out/arch/arm64/boot/

          # Copy whichever kernel Image variant exists
          cp dre-kernel-source/out/arch/arm64/boot/Image* kernel-zip/ 2>/dev/null || true

          # Copy AnyKernel3 contents
          cp -r AnyKernel3/* kernel-zip/ || true

          # Create flashable zip
          zip -r kernel-build.zip kernel-zip/

          # Move to workspace
          mv kernel-build.zip $GITHUB_WORKSPACE/kernel-build.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build
          path: kernel-build.zip